spring:
  activemq:
    broker-url: tcp://localhost:61616
    user: admin
    password: admin
  jms:
    pub-sub-domain: false
  data:
    redis:
      host: localhost
      port: 6379
      # 无密码可省略；有密码时取消注释
      # password: your-redis-password
      # 连接与命令超时（可选，企业环境常用）
      # timeout: 10s
      # connect-timeout: 5s
  datasource:
    url: jdbc:mysql://localhost:3306/activemq_demo?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=utf8
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

demo:
  jms:
    queue-name: demo.queue.boot
  idempotency:
    redis-key-prefix: "idem:"
    ttl-seconds: 86400
