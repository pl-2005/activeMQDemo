spring:
  # 已引入 Redis 依赖但尚未实现 Redis 幂等时，若本机未启动 Redis，可保留下面排除项避免启动失败。
  # 完成 Phase3 R3/R4 后删除 exclude，并确保 Redis 可连。
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
  activemq:
    broker-url: tcp://localhost:61616
    user: admin
    password: admin
  jms:
    pub-sub-domain: false
  data:
    redis:
      host: localhost
      port: 6379

demo:
  jms:
    queue-name: demo.queue.boot
